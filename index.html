<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AdditiveDEX">
<title>AdditiveDEX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0e1a;--sur:#111827;--sur2:#1a2235;--bdr:#1e3a5f;
  --acc:#00d4ff;--acc2:#ff6b35;--warn:#ff3b5c;--ok:#00ff9d;--yel:#ffd700;
  --txt:#e2e8f0;--dim:#64748b;
  --lg:#00c97a;--ep:#a78bfa;--ra:#38bdf8;--uc:#86efac;--co:#94a3b8;
}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100vh;
  /* iOSでposition:fixedが効かない問題の回避 */
  padding-top:60px;
  padding-bottom:70px;
}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;z-index:0}

/* Header */
#hdr{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(10,14,26,.98);border-bottom:1px solid var(--bdr);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Orbitron',sans-serif;font-size:19px;font-weight:900;color:var(--acc);letter-spacing:2px}
.logo span{color:var(--acc2)}
.hdr-s{display:flex;gap:14px}
.hs{text-align:center}
.hs .v{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--acc)}
.hs .l{font-size:10px;color:var(--dim)}

/* Nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(10,14,26,.98);border-top:1px solid var(--bdr);display:flex}
.nb{flex:1;background:none;border:none;color:var(--dim);padding:10px 4px 12px;font-size:10px;font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;-webkit-appearance:none;min-height:54px}
.nb .ic{font-size:20px;line-height:1.2}
.nb.on{color:var(--acc);font-weight:700}

/* Pages */
.pg{display:none;padding:16px;position:relative;z-index:1}
.pg.on{display:block}


/* Scan area */
.scan-label{display:block;background:var(--sur);border:2px dashed var(--bdr);border-radius:16px;padding:44px 20px;text-align:center;cursor:pointer;margin-bottom:16px;-webkit-user-select:none;user-select:none}
.scan-label:active{background:rgba(0,212,255,.06);border-color:var(--acc)}
.scan-label input{position:absolute;width:0;height:0;opacity:0;pointer-events:none}
.sd-ic{font-size:52px;margin-bottom:12px;display:block}
.sd-t{font-size:15px;color:var(--dim);line-height:1.7}
.sd-s{font-size:12px;color:var(--dim);opacity:.6;margin-top:6px}

.preview-img{width:100%;max-height:200px;object-fit:cover;border-radius:14px;display:block;margin-bottom:10px;border:1px solid var(--bdr)}
.btn{background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--txt);font-family:'Noto Sans JP',sans-serif;cursor:pointer;-webkit-appearance:none;width:100%;display:block;text-align:center;margin-bottom:8px}
.btn:active{opacity:.6}
.btn-p{background:var(--acc);color:#000;border-color:var(--acc);font-weight:700}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn-row .btn{margin-bottom:0}

/* Loader */
.loader{text-align:center;padding:48px 16px}
.spin{width:48px;height:48px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--dim)}

/* Results */
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:12px;text-align:center}
.sv{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;margin-bottom:3px}
.sv-t{color:var(--acc)}.sv-d{color:var(--warn)}.sv-n{color:var(--acc2)}
.sl{font-size:10px;color:var(--dim)}
.ib{background:var(--sur2);border-radius:10px;padding:12px;font-size:12px;line-height:1.9;color:var(--dim);margin-bottom:12px;max-height:110px;overflow-y:auto;word-break:break-all}
.hi{color:var(--warn);font-weight:700}
.rw{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:14px}
.rl{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:8px}
.rs{font-weight:700;color:var(--txt)}
.pb{height:8px;background:var(--sur2);border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .8s ease}
.pfh{background:var(--warn)}.pfm{background:var(--yel)}.pfl{background:var(--ok)}

/* Additive cards */
.al{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.ac{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;overflow:hidden}
.ah{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;-webkit-user-select:none;user-select:none}
.ah:active{background:var(--sur2)}
.ae{font-size:24px;width:36px;text-align:center;flex-shrink:0}
.ai{flex:1;min-width:0}
.an{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aca{font-size:11px;color:var(--dim)}
.ab{display:none;padding:0 14px 14px;border-top:1px solid var(--bdr)}
.ab.o{display:block}
.ad{font-size:13px;line-height:1.7;color:var(--dim);margin:10px 0 8px}
.co{font-size:12px;color:var(--dim);padding:5px 0;border-bottom:1px solid var(--bdr);display:flex;gap:6px}
.co:last-of-type{border-bottom:none}
.cd{color:var(--warn);flex-shrink:0}
.st{font-size:11px;color:var(--dim);opacity:.6;margin-top:8px}
.pill{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0}
.ph{background:rgba(255,59,92,.18);color:#ff8fa3}
.pm{background:rgba(255,215,0,.15);color:#fcd34d}
.pl{background:rgba(0,255,157,.12);color:#6ee7b7}
.nb2{background:rgba(255,107,53,.2);color:var(--acc2);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0}
.ar{font-size:12px;color:var(--dim);transition:transform .2s;flex-shrink:0}
.ar.o{transform:rotate(180deg)}
.es{text-align:center;padding:48px 16px;color:var(--dim)}
.ei{font-size:48px;margin-bottom:12px;opacity:.35}

/* Dex */
.dpw{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:14px}
.pl2{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:6px}
.pl2 span:last-child{font-family:'Orbitron',sans-serif;font-weight:700;color:var(--acc)}
.rg{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.rs2{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:8px 4px;text-align:center}
.rv{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;margin-bottom:2px}
.rvlg{color:var(--lg)}.rvep{color:var(--ep)}.rvra{color:var(--ra)}.rvuc{color:var(--uc)}.rvco{color:var(--co)}
.rl2{font-size:9px;color:var(--dim)}
.fr{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.fr::-webkit-scrollbar{display:none}
.fb{background:var(--sur);border:1px solid var(--bdr);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;white-space:nowrap;color:var(--dim);font-family:'Noto Sans JP',sans-serif;-webkit-appearance:none;flex-shrink:0}
.fb:active{opacity:.6}
.fb.on{background:rgba(0,212,255,.12);border-color:var(--acc);color:var(--acc);font-weight:700}
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.di{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer;position:relative;-webkit-user-select:none;user-select:none}
.di:active{opacity:.6}
.di.lk{opacity:.3;pointer-events:none}
.ds{height:3px;position:absolute;top:0;left:0;right:0;border-radius:12px 12px 0 0}
.slg{background:var(--lg)}.sep{background:var(--ep)}.sra{background:var(--ra)}.suc{background:var(--uc)}.sco{background:var(--co)}
.de{font-size:26px;margin:4px 0}
.dn{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc{font-size:9px;color:var(--dim)}

/* Achievements */
.stl{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--acc);letter-spacing:2px;margin-bottom:12px}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ach{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:14px;text-align:center;position:relative}
.ach.ul{border-color:rgba(0,212,255,.4)}
.ach.lk{opacity:.35}
.ai2{font-size:30px;margin-bottom:6px}
.an2{font-size:13px;font-weight:700;margin-bottom:4px}
.ad2{font-size:11px;color:var(--dim);line-height:1.5}
.ag2{position:absolute;top:8px;right:8px;background:rgba(0,212,255,.15);color:var(--acc);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}

/* Data */
.dbi{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:14px;margin-bottom:14px}
.dbi h3{font-size:14px;font-weight:700;margin-bottom:4px}
.dbi p{font-size:12px;color:var(--dim);line-height:1.7}
.dcard{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:10px}
.dit{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;-webkit-user-select:none;user-select:none}
.dit:active{background:var(--sur2)}
.dit:last-child{border-bottom:none}
.dem{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.din{flex:1;min-width:0}
.dna{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dca{font-size:11px;color:var(--dim)}
.fds{display:flex;gap:2px;margin-top:3px}
.fd{width:5px;height:5px;border-radius:50%}
.fdf{background:var(--acc)}.fde{background:var(--bdr)}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
.mbg.o{display:flex}
.mod{background:var(--sur);border-radius:20px 20px 0 0;border-top:1px solid var(--bdr);padding:20px 18px 36px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mh{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 18px}
.msg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.msc{background:var(--sur2);border-radius:10px;padding:10px;text-align:center}
.mv{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px}
.ml{font-size:10px;color:var(--dim)}
.ft{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ftg{background:var(--sur2);border-radius:20px;font-size:11px;padding:3px 10px;color:var(--dim)}

/* Toast */
.tw{position:fixed;top:68px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;z-index:300;pointer-events:none}
.tos{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px;animation:ti .25s ease,to2 .25s ease 2.75s forwards}
.tos.er{border-color:rgba(255,59,92,.5)}
@keyframes ti{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes to2{from{opacity:1}to{opacity:0}}
.tic{font-size:22px}.ttl{font-size:13px;font-weight:700;margin-bottom:1px}.tsb{font-size:11px;color:var(--dim)}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo">Additive<span>DEX</span></div>
  <div class="hdr-s">
    <div class="hs"><div class="v" id="hScan">0</div><div class="l">スキャン</div></div>
    <div class="hs"><div class="v" id="hColl">0</div><div class="l">取得済み</div></div>
  </div>
</div>

<div class="tw" id="tw"></div>

<!-- SCAN -->
<div class="pg on" id="pg-scan">

  <label class="scan-label" id="scanLabel">
    <input type="file" id="fileIn" accept="image/*">
    <span class="sd-ic">📷</span>
    <div class="sd-t">ここをタップして写真を選択</div>
    <div class="sd-s">カメラ撮影 または カメラロールから選べます</div>
  </label>

  <div id="prevWrap" style="display:none">
    <img id="prevImg" class="preview-img" alt="">
    <div class="btn-row">
      <button class="btn" id="btnReset">やり直す</button>
      <button class="btn btn-p" id="btnAnalyze">🔍 解析スタート</button>
    </div>
  </div>

  <div id="loadWrap" style="display:none">
    <div class="loader">
      <div class="spin"></div>
      <div class="ltxt" id="ltxt">添加物データベースと照合中...</div>
    </div>
  </div>

  <div id="resWrap" style="display:none">
    <div class="ib" id="ingrBox"></div>
    <div class="sum-grid">
      <div class="sc"><div class="sv sv-t" id="sT">0</div><div class="sl">検出数</div></div>
      <div class="sc"><div class="sv sv-d" id="sD">0</div><div class="sl">要注意</div></div>
      <div class="sc"><div class="sv sv-n" id="sN">0</div><div class="sl">NEW!!</div></div>
    </div>
    <div class="rw">
      <div class="rl"><span>総合リスクスコア</span><span class="rs" id="rsT">低リスク — 0/100</span></div>
      <div class="pb"><div id="rsF" class="pf pfl" style="width:0%"></div></div>
    </div>
    <div class="al" id="adList"></div>
    <div class="btn-row">
      <button class="btn" id="btnRescan">再スキャン</button>
      <button class="btn" id="btnDex">図鑑を見る</button>
    </div>
  </div>
</div>

<!-- DEX -->
<div class="pg" id="pg-dex">
  <div class="dpw">
    <div class="pl2"><span>コレクション進捗</span><span id="dpT">0 / 30</span></div>
    <div class="pb"><div class="pf pfl" id="dpF" style="width:0%"></div></div>
  </div>
  <div class="rg">
    <div class="rs2"><div class="rv rvlg" id="cLg">0</div><div class="rl2">LEGEND</div></div>
    <div class="rs2"><div class="rv rvep" id="cEp">0</div><div class="rl2">EPIC</div></div>
    <div class="rs2"><div class="rv rvra" id="cRa">0</div><div class="rl2">RARE</div></div>
    <div class="rs2"><div class="rv rvuc" id="cUc">0</div><div class="rl2">UNCMN</div></div>
    <div class="rs2"><div class="rv rvco" id="cCo">0</div><div class="rl2">COMMON</div></div>
  </div>
  <div class="fr" id="fr">
    <button class="fb on" data-f="all">すべて</button>
    <button class="fb" data-f="got">取得済み</button>
    <button class="fb" data-f="high">高リスク</button>
    <button class="fb" data-f="mid">中リスク</button>
    <button class="fb" data-f="low">低リスク</button>
  </div>
  <div class="dg" id="dg"></div>
</div>

<!-- ACH -->
<div class="pg" id="pg-ach">
  <div class="stl">実績バッジ</div>
  <div class="ag" id="achG"></div>
</div>

<!-- DATA -->
<div class="pg" id="pg-data">
  <div class="dbi">
    <h3>添加物データベース v2.3</h3>
    <p>最終更新: 2025年3月10日 ｜ 収録: 30種<br>出典: 食品添加物公定書第10版 / 厚生労働省告示 / JECFA / IARC</p>
  </div>
  <div class="stl">高リスク</div><div class="dcard" id="dH"></div>
  <div class="stl">中リスク</div><div class="dcard" id="dM"></div>
  <div class="stl">低リスク（参考）</div><div class="dcard" id="dL"></div>
  <div style="height:8px"></div>
</div>

<!-- NAV -->
<nav id="nav">
  <button class="nb on" id="nb-scan"><span class="ic">📷</span>スキャン</button>
  <button class="nb" id="nb-dex"><span class="ic">📚</span>図鑑</button>
  <button class="nb" id="nb-ach"><span class="ic">🏆</span>実績</button>
  <button class="nb" id="nb-data"><span class="ic">🗄️</span>データ</button>
</nav>

<!-- MODAL -->
<div class="mbg" id="mbg"><div class="mod"><div class="mh"></div><div id="mbd"></div></div></div>

<script>
var DB=[
  {id:"tartrazine",name:"タール色素（黄色4号）",em:"🟡",cat:"合成着色料",risk:"high",freq:2,desc:"石炭タール由来の合成着色料。EUでは子どもへの影響に関する注意表示義務あり（規則EC No.1333/2008）。",c:["過活動症との関連（EFSA 2008年評価）","アレルギー反応（アスピリン感受性者）","ADI: 7.5 mg/kg体重/日（JECFA設定）"],src:["食品安全委員会 添加物評価書","EFSA ANS Panel (2009)"],food:["菓子","清涼飲料水","漬物"]},
  {id:"sunset_yellow",name:"タール色素（黄色5号）",em:"🧡",cat:"合成着色料",risk:"high",freq:2,desc:"サンセットイエローFCF。EU規制では6種合成色素の1つとして子どもの多動との関連が示唆され表示義務あり。",c:["過活動との関連（McCann et al. 2007, Lancet）","アレルギー反応","ADI: 4 mg/kg体重/日（JECFA）"],src:["Lancet 2007;370:1560-1567","EFSA評価書"],food:["菓子","清涼飲料水"]},
  {id:"sodium_nitrite",name:"亜硝酸Na（亜硝酸ナトリウム）",em:"🔴",cat:"発色剤",risk:"high",freq:5,desc:"ハム・ソーセージなどの発色とボツリヌス菌抑制に使用。IARCはニトロソアミン類をグループ2Aに分類。",c:["ニトロソアミン生成の可能性（IARC分類）","乳幼児のメトヘモグロビン血症リスク","使用基準: 食肉製品70mg/kg以下（日本）"],src:["IARC Monographs Vol.94","食品添加物公定書第10版"],food:["ハム","ソーセージ","ベーコン","魚肉練製品"]},
  {id:"saccharin",name:"サッカリンNa",em:"🍬",cat:"甘味料",risk:"high",freq:3,desc:"人工甘味料。過去に膀胱がんとの関連報告。現在のJECFA評価では使用量基準内で許容。高摂取量での影響は継続評価中。",c:["動物実験での膀胱がん報告（高用量）","ADI: 5 mg/kg体重/日（JECFA）","乳幼児・妊婦での使用は避けることを推奨"],src:["JECFA評価 (2017)","食品安全委員会評価書"],food:["清涼飲料水","菓子","漬物"]},

// ── ナビゲーション ──
function showPage(p){
  var pgs=document.querySelectorAll(".pg");
  for(var i=0;i<pgs.length;i++)pgs[i].classList.remove("on");
  var nbs=document.querySelectorAll(".nb");
  for(var i=0;i<nbs.length;i++)nbs[i].classList.remove("on");
  document.getElementById("pg-"+p).classList.add("on");
  document.getElementById("nb-"+p).classList.add("on");
  window.scrollTo(0,0);
  if(p==="dex")renderDex();
  if(p==="ach")renderAch();
  if(p==="data")renderData();
}

// navボタン：touchstartで即反応（iOSのclickの300ms遅延を回避）
var navBtns=[
  {id:"nb-scan",page:"scan"},
  {id:"nb-dex",page:"dex"},
  {id:"nb-ach",page:"ach"},
  {id:"nb-data",page:"data"}
];
navBtns.forEach(function(nb){
  var el=document.getElementById(nb.id);
  var p=nb.page;
  el.addEventListener("touchstart",function(e){
    e.preventDefault();
    showPage(p);
  },{passive:false});
  el.addEventListener("click",function(){showPage(p)});
});

// Toast
function toast(ic,title,sub,err){
  var w=document.getElementById("tw");
  var d=document.createElement("div");
  d.className="tos"+(err?" er":"");
  d.innerHTML='<div class="tic">'+ic+'</div><div><div class="ttl">'+title+'</div><div class="tsb">'+sub+'</div></div>';
  w.appendChild(d);
  setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d)},3200);
}

// ── File input ──
var fileIn=document.getElementById("fileIn");
var prevWrap=document.getElementById("prevWrap");
var prevImg=document.getElementById("prevImg");
var scanLabel=document.getElementById("scanLabel");
var imgB64=null;

fileIn.addEventListener("change",function(){
  if(this.files&&this.files[0])loadImg(this.files[0]);
});

function loadImg(f){
  var r=new FileReader();
  r.onload=function(ev){
    prevImg.src=ev.target.result;
    imgB64=ev.target.result.split(",")[1];
    scanLabel.style.display="none";
    prevWrap.style.display="block";
    document.getElementById("resWrap").style.display="none";
  };
  r.readAsDataURL(f);
}

function resetScan(){
  imgB64=null;
  fileIn.value="";
  scanLabel.style.display="block";
  prevWrap.style.display="none";
  document.getElementById("resWrap").style.display="none";
  document.getElementById("rsF").style.width="0%";
}

document.getElementById("btnReset").addEventListener("click",resetScan);
document.getElementById("btnRescan").addEventListener("click",resetScan);
document.getElementById("btnDex").addEventListener("click",function(){showPage("dex")});

// ── 解析 ──
document.getElementById("btnAnalyze").addEventListener("click",function(){
  if(!imgB64){toast("📷","写真がありません","先に写真を選択してください",true);return}
  prevWrap.style.display="none";
  document.getElementById("loadWrap").style.display="block";

  var msgs=["原材料テキストを認識中...","添加物データベースと照合中...","リスクスコアを計算中...","新規コレクションを確認中..."];
  var li=0;
  var intv=setInterval(function(){document.getElementById("ltxt").textContent=msgs[li++%msgs.length]},1400);

  var prompt="あなたは食品添加物の専門家です。この食品ラベルの画像から原材料・添加物表示を読み取ってください。\n\n以下の添加物リストと照合し、含まれているものをidで返してください：\n"+
    DB.map(function(a){return"- "+a.name+"（id: "+a.id+"）"}).join("\n")+
    "\n\nJSONのみで返答（余計な文字・マークダウン不要）：\n{\"raw_ingredients\":\"テキスト\",\"detected_additives\":[\"id1\"],\"notes\":\"\"}";

  fetch("https://additivedex-api.vercel.app/api/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgB64}},
        {type:"text",text:prompt}
      ]}]
    })
  })
  .then(function(r){return r.json()})
  .then(function(data){
    clearInterval(intv);
    document.getElementById("loadWrap").style.display="none";
    if(data.error)throw new Error(data.error.message);
    var txt=data.content.map(function(c){return c.text||""}).join("");
    txt=txt.replace(/```[a-z]*\n?|```/g,"").trim();
    var result=JSON.parse(txt);
    showResults(result);
  })
  .catch(function(e){
    clearInterval(intv);
    document.getElementById("loadWrap").style.display="none";
    prevWrap.style.display="block";
    toast("❌","解析エラー",String(e.message).slice(0,80),true);
  });
});

function showResults(result){
  ST.sc++;
  var detected=(result.detected_additives||[]).map(function(id){
    return DB.find(function(a){return a.id===id});
  }).filter(Boolean);
  var newOnes=detected.filter(function(a){return!ST.col[a.id]});
  detected.forEach(function(a){ST.col[a.id]=(ST.col[a.id]||0)+1});
  var prevAch=ST.ach.slice();
  checkAch();
  var newAch=ST.ach.filter(function(id){return prevAch.indexOf(id)<0});
  save();

  var score=0;
  detected.forEach(function(a){score+=a.risk==="high"?30:a.risk==="mid"?15:3});
  score=Math.min(100,score);
  var rc=score>=60?"h":score>=30?"m":"l";
  var rl=score>=60?"高リスク":score>=30?"中リスク":"低リスク";

  var ib=document.getElementById("ingrBox");
  if(result.raw_ingredients){
    var html=result.raw_ingredients.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    detected.forEach(function(a){
      var n=a.name.split("（")[0];
      html=html.replace(new RegExp(n.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"g"),'<span class="hi">'+n+"</span>");
    });
    ib.innerHTML=html;
  }else{ib.textContent="（原材料テキストを読み取れませんでした）"}

  document.getElementById("sT").textContent=detected.length;
  document.getElementById("sD").textContent=detected.filter(function(a){return a.risk==="high"}).length;
  document.getElementById("sN").textContent=newOnes.length;

  var fill=document.getElementById("rsF");
  fill.className="pf pf"+rc;
  setTimeout(function(){fill.style.width=score+"%"},100);
  document.getElementById("rsT").textContent=rl+" — "+score+"/100";

  var list=document.getElementById("adList");
  list.innerHTML="";
  if(detected.length===0){
    list.innerHTML='<div class="es"><div class="ei">✅</div><div style="font-size:15px;font-weight:700;color:var(--txt);margin-bottom:6px">検出なし</div><div style="font-size:13px">データベース収録の添加物は含まれていないようです</div></div>';
  }else{
    var sorted=detected.slice().sort(function(a,b){
      var o={high:0,mid:1,low:2};return o[a.risk]-o[b.risk];
    });
    sorted.forEach(function(a){
      var isNew=newOnes.indexOf(a)>=0;
      var d=document.createElement("div");
      d.className="ac";
      var cs=a.c.map(function(c){return'<div class="co"><span class="cd">•</span><span>'+c+"</span></div>"}).join("");
      d.innerHTML=
        '<div class="ah">'+
          '<div class="ae">'+a.em+"</div>"+
          '<div class="ai"><div class="an">'+a.name+"</div><div class=\"aca\">"+a.cat+"</div></div>"+
          (isNew?'<span class="nb2">NEW!</span>':"")+
          '<span class="'+RP[a.risk]+'">'+RL2[a.risk]+"</span>"+
          '<span class="ar">▼</span>'+
        "</div>"+
        '<div class="ab">'+
          '<div class="ad">'+a.desc+"</div>"+
          cs+
          '<div class="st">出典: '+a.src.join(" / ")+"</div>"+
        "</div>";
      d.querySelector(".ah").addEventListener("click",function(){
        var body=d.querySelector(".ab");
        var arr=d.querySelector(".ar");
        body.classList.toggle("o");
        arr.classList.toggle("o");
      });
      list.appendChild(d);
    });
  }

  document.getElementById("resWrap").style.display="block";
  window.scrollTo(0,0);

  if(newOnes.length>0){
    var rarest=newOnes.slice().sort(function(a,b){return a.freq-b.freq})[0];
    toast("🎉","新しい添加物を取得！","["+RL[gr(rarest.freq)]+"] "+rarest.name);
  }
  newAch.forEach(function(id){
    var a=ACH.find(function(x){return x.id===id});
    if(a)setTimeout(function(){toast("🏆","実績解除！",a.icon+" "+a.name)},1000);
  });
}

function checkAch(){
  ACH.forEach(function(a){
    if(ST.ach.indexOf(a.id)<0&&a.cond(ST))ST.ach.push(a.id);
  });
}

// ── DEX ──
function renderDex(){
  var tot=DB.length,got=Object.keys(ST.col).length;
  document.getElementById("dpT").textContent=got+" / "+tot;
  document.getElementById("dpF").style.width=(got/tot*100)+"%";
  var cnt={lg:0,ep:0,ra:0,uc:0,co:0};
  Object.keys(ST.col).forEach(function(id){
    var a=DB.find(function(x){return x.id===id});
    if(a)cnt[gr(a.freq)]++;
  });
  document.getElementById("cLg").textContent=cnt.lg;
  document.getElementById("cEp").textContent=cnt.ep;
  document.getElementById("cRa").textContent=cnt.ra;
  document.getElementById("cUc").textContent=cnt.uc;
  document.getElementById("cCo").textContent=cnt.co;
  renderDexGrid(ST.cf);
}

function renderDexGrid(f){
  var g=document.getElementById("dg");
  g.innerHTML="";
  var items=DB;
  if(f==="got")items=items.filter(function(a){return ST.col[a.id]});
  else if(f==="high")items=items.filter(function(a){return a.risk==="high"});
  else if(f==="mid")items=items.filter(function(a){return a.risk==="mid"});
  else if(f==="low")items=items.filter(function(a){return a.risk==="low"});
  items.forEach(function(a){
    var rar=gr(a.freq),got2=!!ST.col[a.id],cnt=ST.col[a.id]||0;
    var d=document.createElement("div");
    d.className="di"+(got2?"":" lk");
    d.innerHTML='<div class="ds '+RS2[rar]+'"></div><div class="de">'+(got2?a.em:"❓")+'</div><div class="dn">'+(got2?a.name:"???")+'</div><div class="dc">'+(got2?"×"+cnt:"未取得")+"</div>";
    if(got2){
      (function(item){
        d.addEventListener("touchstart",function(e){e.preventDefault();showDetail(item)},{passive:false});
        d.addEventListener("click",function(){showDetail(item)});
      })(a);
    }
    g.appendChild(d);
  });
}

document.getElementById("fr").addEventListener("click",function(e){
  var b=e.target.closest(".fb");if(!b)return;
  var fbs=document.querySelectorAll(".fb");
  for(var i=0;i<fbs.length;i++)fbs[i].classList.remove("on");
  b.classList.add("on");
  ST.cf=b.getAttribute("data-f");
  renderDexGrid(ST.cf);
});

// ── ACH ──
function renderAch(){
  var g=document.getElementById("achG");
  g.innerHTML="";
  checkAch();
  ACH.forEach(function(a){
    var u=ST.ach.indexOf(a.id)>=0;
    var d=document.createElement("div");
    d.className="ach"+(u?" ul":" lk");
    d.innerHTML=(u?'<span class="ag2">取得済み</span>':"")+
      '<div class="ai2">'+a.icon+"</div>"+
      '<div class="an2">'+a.name+"</div>"+
      '<div class="ad2">'+a.desc+"</div>";
    g.appendChild(d);
  });
}

// ── DATA ──
function renderData(){
  ["high","mid","low"].forEach(function(risk){
    var key=risk==="high"?"H":risk==="mid"?"M":"L";
    var el=document.getElementById("d"+key);
    el.innerHTML="";
    DB.filter(function(a){return a.risk===risk}).forEach(function(a){
      var d=document.createElement("div");
      d.className="dit";
      var dots=Array.from({length:10},function(_,i){
        return'<span class="fd '+(i<a.freq?"fdf":"fde")+'"></span>';
      }).join("");
      d.innerHTML='<div class="dem">'+a.em+'</div><div class="din"><div class="dna">'+a.name+'</div><div class="dca">'+a.cat+'</div><div class="fds">'+dots+"</div></div>"+
        '<span class="'+RP[risk]+'">'+RL2[risk]+"</span>";
      (function(item){
        d.addEventListener("touchstart",function(e){e.preventDefault();showDetail(item)},{passive:false});
        d.addEventListener("click",function(){showDetail(item)});
      })(a);
      el.appendChild(d);
    });
  });
}

// ── MODAL ──
function showDetail(a){
  if(!a)return;
  var rar=gr(a.freq);
  var cs=a.c.map(function(c){return'<div class="co"><span class="cd">•</span><span>'+c+"</span></div>"}).join("");
  var fs=a.food.map(function(f){return'<span class="ftg">'+f+"</span>"}).join("");
  document.getElementById("mbd").innerHTML=
    '<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">'+
      '<div style="font-size:36px">'+a.em+"</div>"+
      "<div>"+
        '<div style="display:flex;gap:6px;align-items:center;margin-bottom:5px">'+
          '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+RBG[rar]+';color:'+RC[rar]+'">'+RL[rar]+"</span>"+
          '<span class="'+RP[a.risk]+'">'+RL2[a.risk]+"</span>"+
        "</div>"+
        '<div style="font-size:16px;font-weight:700">'+a.name+"</div>"+
        '<div style="font-size:12px;color:var(--dim)">'+a.cat+"</div>"+
      "</div>"+
    "</div>"+
    '<div class="msg">'+
      '<div class="msc"><div class="mv" style="color:var(--acc)">'+(ST.col[a.id]||0)+'回</div><div class="ml">取得回数</div></div>'+
      '<div class="msc"><div class="mv">'+a.freq+"/10</div><div class=\"ml\">使用頻度スコア</div></div>"+
    "</div>"+
    '<p style="font-size:13px;line-height:1.7;color:var(--dim);margin-bottom:12px">'+a.desc+"</p>"+
    '<div style="font-size:11px;font-weight:700;color:var(--dim);margin-bottom:8px">注意事項</div>'+
    cs+
    '<div style="font-size:11px;font-weight:700;color:var(--dim);margin:12px 0 8px">主な使用食品</div>'+
    '<div class="ft">'+fs+"</div>"+
    '<div style="font-size:11px;color:var(--dim);opacity:.6;margin-top:12px">出典: '+a.src.join(" ／ ")+"</div>";
  document.getElementById("mbg").classList.add("o");
}

document.getElementById("mbg").addEventListener("touchstart",function(e){
  if(e.target===this){e.preventDefault();this.classList.remove("o")}
},{passive:false});
document.getElementById("mbg").addEventListener("click",function(e){
  if(e.target===this)this.classList.remove("o");
});

// Init
save();
renderData();
</script>
</body>
</html>
